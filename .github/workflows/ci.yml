name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ai-service:
    name: AI service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: PYTHONPATH=. pytest --cov=app --cov-report=term --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: ai-coverage
          path: ai-service/coverage.xml
        if: always()

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  backend:
    name: Backend (mvn verify + Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # Docker is available on ubuntu runners → Testcontainers integration tests run here.
      - run: mvn -B verify
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco
          path: backend/target/site/jacoco/
        if: always()

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [ai-service, frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images (no push)
        run: |
          docker build -t lexmind-backend ./backend
          docker build -t lexmind-ai ./ai-service
          docker build -t lexmind-frontend ./frontend
