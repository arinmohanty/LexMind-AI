spring:
  application:
    name: lexmind-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lexmind}
    username: ${DB_USERNAME:lexmind}
    password: ${DB_PASSWORD:lexmind}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate          # schema owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}
  # Java 21 virtual threads for high-I/O concurrency (ADR-0003)
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  forward-headers-strategy: framework

# ---- LexMind application config ----
lexmind:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-only-256-bit-secret-key!!}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15 min
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}  # 14 days
    issuer: lexmind-ai
  storage:
    backend: ${STORAGE_BACKEND:local}       # local | s3
    local-path: ${STORAGE_LOCAL_PATH:./data/uploads}
    max-file-bytes: ${STORAGE_MAX_BYTES:26214400}          # 25 MB
    allowed-mime-types: application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/png,image/jpeg,image/tiff
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    service-token: ${AI_SERVICE_TOKEN:dev-internal-service-token}
    timeout-seconds: ${AI_TIMEOUT:120}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    ai.lexmind: ${LOG_LEVEL:INFO}
